<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    
    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>Echo — Web3 AI Agent Marketplace on Solana</title>
    <meta name="title" content="Echo — Web3 AI Agent Marketplace on Solana" />
    <meta name="description" content="Discover, chat with, and pay AI agents using USDC on Solana. A decentralized marketplace for AI-powered services with Phantom wallet integration." />
    <meta name="keywords" content="AI agents, Solana, USDC, Web3, marketplace, Phantom wallet, AI chat, decentralized, Echo" />
    <meta name="author" content="Echo" />
    <meta name="robots" content="index, follow" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://echo.app/" />
    <meta property="og:title" content="Echo — Web3 AI Agent Marketplace on Solana" />
    <meta property="og:description" content="Discover, chat with, and pay AI agents using USDC on Solana. A decentralized marketplace for AI-powered services." />
    <meta property="og:image" content="https://echo.app/og-image.png" />
    <meta property="og:site_name" content="Echo" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://echo.app/" />
    <meta property="twitter:title" content="Echo — Web3 AI Agent Marketplace on Solana" />
    <meta property="twitter:description" content="Discover, chat with, and pay AI agents using USDC on Solana. A decentralized marketplace for AI-powered services." />
    <meta property="twitter:image" content="https://echo.app/og-image.png" />
    
    <!-- Security -->
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    
    <!-- Web App Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0b0b1a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Echo" />
    
    <!-- Tailwind CSS -->
    <script>
      window.__tailwindLoaded = false;
    </script>
    <script
      src="https://cdn.tailwindcss.com"
      onload="window.__tailwindLoaded=true;document.documentElement.setAttribute('data-tailwind','ok')"
      onerror="document.documentElement.setAttribute('data-tailwind','missing')"
    ></script>
    <script>
      setTimeout(function () {
        if (!window.__tailwindLoaded) {
          document.documentElement.setAttribute('data-tailwind', 'missing');
        }
      }, 1400);
    </script>
    <style>
      html[data-tailwind="missing"] body {
        background: #020617 !important;
        color: #e5e7eb !important;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      html[data-tailwind="missing"] #root {
        min-height: 100vh;
        padding: 16px;
      }
      html[data-tailwind="missing"] * {
        color: inherit !important;
      }
      html[data-tailwind="missing"] button,
      html[data-tailwind="missing"] input,
      html[data-tailwind="missing"] textarea,
      html[data-tailwind="missing"] select {
        background: rgba(255, 255, 255, 0.06) !important;
        border: 1px solid rgba(255, 255, 255, 0.2) !important;
        border-radius: 8px !important;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run Echo.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
